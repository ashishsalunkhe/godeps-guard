name: "godeps-guard"
description: "A Go dependency impact analyzer and CI enforcement tool to prevent binary bloat."
branding:
  icon: "shield"
  color: "blue"
inputs:
  base-ref:
    description: "The base branch to compare against (e.g., origin/main)"
    required: true
  config-file:
    description: "Path to the .godepsguard.yaml config file"
    required: false
    default: ".godepsguard.yaml"
  format:
    description: "Output format (markdown, json)"
    required: false
    default: "markdown"
  comment:
    description: "Whether to output in PR comment mode"
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: "^1.24.0"
    - name: Install godeps-guard
      shell: bash
      run: go install github.com/ashishsalunkhe/godeps-guard/cmd/godeps-guard@latest
    - name: Run godeps-guard check
      shell: bash
      run: |
        godeps-guard check \\
          --base ${{ inputs.base-ref }} \\
          --config ${{ inputs.config-file }} \\
          --format ${{ inputs.format }} \\
          ${{ inputs.comment == 'true' && '--comment' || '' }} >> $GITHUB_STEP_SUMMARY
