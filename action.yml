name: "godeps-guard"
description: "A Go dependency impact analyzer and CI enforcement tool to prevent binary bloat."
author: "Ashish Salunkhe"

branding:
  icon: 'shield'
  color: 'blue'

inputs:
  base-ref:
    description: "The base reference (e.g., origin/main) to compare dependencies against."
    required: true
    default: "origin/main"
  config-file:
    description: "Path to the .godepsguard.yaml configuration file."
    required: false
    default: ".godepsguard.yaml"
  version:
    description: "The version of godeps-guard to install (e.g., latest or a specific tag)."
    required: false
    default: "latest"
  ai:
    description: "Whether to enable AI-powered analysis (requires GODEPS_GUARD_AI_KEY)."
    required: false
    default: "false"
  args:
    description: "Any extra arguments to pass to godeps-guard check."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.24'

    - name: Install godeps-guard
      shell: bash
      run: go install github.com/ashishsalunkhe/godeps-guard/cmd/godeps-guard@${{ inputs.version }}

    - name: Run godeps-guard
      shell: bash
      env:
        GODEPS_GUARD_AI_KEY: ${{ env.GODEPS_GUARD_AI_KEY }}
        GODEPS_GUARD_AI_PROVIDER: ${{ env.GODEPS_GUARD_AI_PROVIDER }}
      run: |
        godeps-guard check \
          --base ${{ inputs.base-ref }} \
          --config ${{ inputs.config-file }} \
          --format markdown \
          ${{ inputs.ai == 'true' && '--ai' || '' }} \
          ${{ inputs.args }} >> $GITHUB_STEP_SUMMARY
